<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 Pokémon GBA Battle Simulator | 레트로 포켓몬 배틀</title>
  <meta name="description" content="단일 HTML 파일로 작동하는 추억의 GBA 포켓몬스터 레트로 배틀 시뮬레이터입니다." />
  
  <!-- CDNs for Portable React Setup -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <!-- Retro Google Fonts & Retro Korean Pixel Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sun-typeface/neo-dunggeunmo@latest/neodgm.css">

  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            pressstart: ['NeoDunggeunmo', '"Press Start 2P"', 'monospace'],
            outfit: ['Outfit', 'sans-serif'],
          },
          colors: {
            poke: {
              dark: '#080a0f',
              card: '#121620',
              panel: 'rgba(18, 22, 32, 0.92)',
              border: '#2e3440',
              yellow: '#ffcc01',
              blue: '#0a7abc',
              bg: '#040711',
            },
            type: {
              normal: '#A8A77A',
              fire: '#EE8130',
              water: '#6390F0',
              electric: '#F7D02C',
              grass: '#7AC74C',
              ice: '#96D9D6',
              fighting: '#C22E28',
              poison: '#A33EA1',
              ground: '#E2BF65',
              flying: '#A98FF3',
              psychic: '#F95587',
              bug: '#A6B91A',
              rock: '#B6A136',
              ghost: '#735797',
              dragon: '#6F35FC',
              dark: '#705746',
              steel: '#B7B7CE',
              fairy: '#D685AD',
            }
          },
          boxShadow: {
            pixel: '4px 4px 0px 0px #000',
            pixelYellow: '4px 4px 0px 0px #ffcc01',
            pixelBorder: '0 0 0 4px #121620, 0 0 0 8px #2e3440',
            pixelGlow: '0 0 15px rgba(255, 204, 1, 0.4)',
          }
        }
      }
    }
  </script>

  <!-- Embedded Custom CRT & Animation Styles -->
  <style>
    body {
      background-color: #04060b;
      font-family: 'Outfit', sans-serif;
    }

    /* Retro CRT Scanlines Effect */
    .crt-effect {
      position: relative;
      overflow: hidden;
    }

    .crt-effect::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.04) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
      z-index: 10;
      background-size: 100% 4px, 6px 100%;
      pointer-events: none;
    }

    /* Pixel Art Sprite Rendering */
    .pixelated {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .font-pixel {
      font-family: 'NeoDunggeunmo', 'Press Start 2P', monospace;
    }

    /* Pokeball Loader Spinner */
    .pokeball-loader {
      width: 60px;
      height: 60px;
      background: linear-gradient(to bottom, #ef5350 50%, #ffffff 50%);
      border-radius: 50%;
      border: 4px solid #333;
      position: relative;
      animation: spin 1.2s linear infinite;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .pokeball-loader::before {
      content: "";
      position: absolute;
      height: 8px;
      width: 60px;
      background: #333;
      top: 22px;
      left: -4px;
    }

    .pokeball-loader::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      border: 4px solid #333;
      border-radius: 50%;
      top: 16px;
      left: 16px;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Pokeball Roll Animation */
    @keyframes ball-roll {
      0% {
        transform: translate3d(-120px, -40px, 0) rotate(-360deg) scale(0.4);
        opacity: 0;
      }
      70% {
        transform: translate3d(10px, 5px, 0) rotate(20deg) scale(1.1);
        opacity: 1;
      }
      100% {
        transform: translate3d(0, 0, 0) rotate(0deg) scale(1);
      }
    }
    .animate-ball-roll {
      animation: ball-roll 0.75s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    /* Pokeball Wiggle Animation */
    @keyframes ball-wiggle {
      0%, 100% { transform: rotate(0); }
      15% { transform: rotate(-15deg); }
      30% { transform: rotate(15deg); }
      45% { transform: rotate(-10deg); }
      60% { transform: rotate(10deg); }
      75% { transform: rotate(-5deg); }
      90% { transform: rotate(5deg); }
    }
    .animate-ball-wiggle {
      animation: ball-wiggle 0.5s ease-in-out infinite;
    }

    /* Pokeball Flash Glow */
    @keyframes ball-flash-glow {
      0% { transform: scale(0.2); opacity: 0; }
      50% { transform: scale(1.8); opacity: 1; }
      100% { transform: scale(1.2); opacity: 0.8; }
    }
    .animate-ball-flash-glow {
      animation: ball-flash-glow 0.4s ease-out forwards;
    }

    /* Pokeball Flash Inner */
    @keyframes ball-flash-inner {
      0% { transform: scale(0.1); opacity: 0; }
      50% { transform: scale(2.5); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }
    .animate-ball-flash-inner {
      animation: ball-flash-inner 0.4s ease-out forwards;
    }

    /* Sparkle Particle */
    @keyframes ball-particle {
      0% { transform: translate3d(0, 0, 0) scale(0.5); opacity: 1; }
      100% { transform: translate3d(var(--dx), var(--dy), 0) scale(0.1); opacity: 0; }
    }
    .animate-ball-particle {
      animation: ball-particle 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    /* Pokémon Materialize Fade-in */
    @keyframes pokemon-materialize {
      0% {
        transform: scale(0);
        filter: brightness(3.5) saturate(0);
        opacity: 0;
      }
      50% {
        transform: scale(1);
        filter: brightness(1.8) saturate(1);
        opacity: 1;
      }
      100% {
        transform: scale(1);
        filter: brightness(1) saturate(1);
        opacity: 1;
      }
    }
    .animate-pokemon-materialize {
      animation: pokemon-materialize 0.6s cubic-bezier(0.215, 0.61, 0.355, 1) forwards;
    }

    /* Pokémon Recall (Retract to ball GBA style) */
    @keyframes pokemon-recall {
      0% {
        transform: scale(1);
        filter: brightness(1) saturate(1);
        opacity: 1;
      }
      30% {
        transform: scale(1.05);
        filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.85)) brightness(2.2);
        opacity: 1;
      }
      100% {
        transform: scale(0);
        filter: drop-shadow(0 0 16px rgba(239, 68, 68, 1)) brightness(3.5);
        opacity: 0;
      }
    }
    .animate-pokemon-recall {
      animation: pokemon-recall 0.5s cubic-bezier(0.55, 0.055, 0.675, 0.19) forwards;
    }

    @keyframes flash-fast {
      0%, 100% { opacity: 0; background-color: white; }
      20%, 60% { opacity: 1; background-color: white; }
      40%, 80% { opacity: 0.8; background-color: #ef4444; }
    }
    .animate-flash-fast {
      animation: flash-fast 0.6s ease-in-out infinite;
    }

    @keyframes bounce-short {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    .animate-bounce-short {
      animation: bounce-short 0.6s ease-in-out infinite;
    }

    @keyframes audience-jump {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3.5px); }
    }
    .animate-audience-1 {
      animation: audience-jump 0.8s ease-in-out infinite;
    }
    .animate-audience-2 {
      animation: audience-jump 0.9s ease-in-out infinite 0.15s;
    }
    .animate-audience-3 {
      animation: audience-jump 0.7s ease-in-out infinite 0.3s;
    }

    /* CRT Flicker & Power-on Animations */
    @keyframes flicker {
      0% { opacity: 0.98; }
      50% { opacity: 1; }
      100% { opacity: 0.99; }
    }
    .flicker {
      animation: flicker 0.15s infinite;
    }

    @keyframes scaleInY {
      0% { transform: scaleY(0.01) scaleX(0); }
      50% { transform: scaleY(0.01) scaleX(1); }
      100% { transform: scaleY(1) scaleX(1); }
    }
    .screen-on {
      animation: scaleInY 0.4s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }

    /* Sprites Attack and Shaking animations */
    @keyframes playerAttackDash {
      0% { transform: translate(0, 0) scale(1); }
      30% { transform: translate(30px, -20px) scale(1.05); }
      70% { transform: translate(-10px, 5px) scale(0.98); }
      100% { transform: translate(0, 0) scale(1); }
    }
    .animate-player-attack {
      animation: playerAttackDash 0.5s ease-in-out forwards;
    }

    @keyframes enemyAttackDash {
      0% { transform: translate(0, 0) scale(1); }
      30% { transform: translate(-30px, 20px) scale(1.05); }
      70% { transform: translate(10px, -5px) scale(0.98); }
      100% { transform: translate(0, 0) scale(1); }
    }
    .animate-enemy-attack {
      animation: enemyAttackDash 0.5s ease-in-out forwards;
    }

    @keyframes damageShake {
      0%, 100% { transform: translate(0, 0); filter: brightness(1) sepia(0); }
      15%, 45%, 75% { transform: translate(-8px, 0); filter: brightness(1.5) sepia(1) saturate(10000%) hue-rotate(-50deg); }
      30%, 60%, 90% { transform: translate(8px, 0); filter: brightness(1.5) sepia(1) saturate(10000%) hue-rotate(-50deg); }
    }
    .animate-damage {
      animation: damageShake 0.6s ease-in-out forwards;
    }

    /* Fire Skill Effect */
    @keyframes skill-flame {
      0% { transform: translateY(20px) scale(0.4); opacity: 0; }
      50% { transform: translateY(-5px) scale(1.3); opacity: 0.9; }
      100% { transform: translateY(-25px) scale(0.6); opacity: 0; }
    }
    .skill-flame-particle {
      animation: skill-flame 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    /* Water Skill Effect */
    @keyframes skill-bubble {
      0% { transform: translateY(25px) scale(0.3) translateX(0); opacity: 0; }
      50% { transform: translateY(0px) scale(1.2) translateX(-6px); opacity: 0.85; }
      100% { transform: translateY(-30px) scale(0.4) translateX(6px); opacity: 0; }
    }
    .skill-bubble-particle {
      animation: skill-bubble 0.6s ease-in-out forwards;
    }

    /* Grass Skill Effect */
    @keyframes skill-leaf {
      0% { transform: translate(-30px, 30px) rotate(0deg) scale(0.4); opacity: 0; }
      55% { transform: translate(5px, -5px) rotate(220deg) scale(1.3); opacity: 1; }
      100% { transform: translate(35px, -35px) rotate(360deg) scale(0.5); opacity: 0; }
    }
    .skill-leaf-particle {
      animation: skill-leaf 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    /* Electric Skill Effect */
    @keyframes skill-lightning {
      0%, 100% { opacity: 0; transform: scaleY(0); }
      10%, 30%, 50%, 70% { opacity: 1; transform: scaleY(1); filter: drop-shadow(0 0 12px #ffcc01); }
      20%, 40%, 60% { opacity: 0; }
    }
    .skill-lightning-bolt {
      animation: skill-lightning 0.6s ease-in-out forwards;
      transform-origin: top;
    }
    @keyframes skill-spark {
      0% { transform: translate(0, 0) scale(1); opacity: 0; }
      50% { transform: translate(var(--spark-x, 20px), var(--spark-y, -20px)) scale(1.4); opacity: 1; }
      100% { transform: translate(calc(var(--spark-x, 20px) * 1.3), calc(var(--spark-y, -20px) * 1.3)) scale(0); opacity: 0; }
    }
    .skill-spark-particle {
      animation: skill-spark 0.5s ease-out forwards;
    }

    /* Psychic Skill Effect */
    @keyframes skill-psychic {
      0% { transform: scale(0.1); opacity: 0; border-width: 8px; }
      40% { transform: scale(1); opacity: 0.9; border-width: 5px; }
      100% { transform: scale(1.7); opacity: 0; border-width: 1px; }
    }
    .skill-psychic-ring {
      animation: skill-psychic 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes skill-psychic-invert {
      0%, 100% { filter: invert(0); }
      20%, 60% { filter: invert(0.85) hue-rotate(120deg) contrast(1.2); }
      40%, 80% { filter: invert(0.5) hue-rotate(240deg) brightness(1.2); }
    }
    .psychic-invert-screen {
      animation: skill-psychic-invert 0.75s ease-in-out;
    }

    /* Ice Skill Effect */
    @keyframes skill-ice {
      0% { transform: scale(0.2) rotate(0deg); opacity: 0; filter: brightness(1.5); }
      40% { transform: scale(1.1) rotate(45deg); opacity: 0.95; }
      70% { transform: scale(1) rotate(45deg); opacity: 0.95; }
      100% { transform: scale(1.4) rotate(90deg); opacity: 0; filter: brightness(2) blur(1px); }
    }
    .skill-ice-shard {
      animation: skill-ice 0.65s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    /* Ghost/Dark Skill Effect */
    @keyframes skill-shadow {
      0% { transform: scale(0.3) translateY(15px); opacity: 0; filter: blur(6px); }
      50% { transform: scale(1.2) translateY(-2px); opacity: 0.8; filter: blur(3px); }
      100% { transform: scale(1.5) translateY(-18px); opacity: 0; filter: blur(8px); }
    }
    .skill-shadow-mist {
      animation: skill-shadow 0.7s ease-in-out forwards;
    }

    /* Normal / Physical Skill Effect */
    @keyframes skill-slash-1 {
      0% { transform: scaleX(0) rotate(-40deg); opacity: 0; }
      40% { transform: scaleX(1.3) rotate(-40deg); opacity: 1; }
      100% { transform: scaleX(1.1) rotate(-40deg); opacity: 0; }
    }
    @keyframes skill-slash-2 {
      0% { transform: scaleX(0) rotate(50deg); opacity: 0; }
      40% { transform: scaleX(1.3) rotate(50deg); opacity: 1; }
      100% { transform: scaleX(1.1) rotate(50deg); opacity: 0; }
    }
    .skill-slash-line-1 {
      animation: skill-slash-1 0.45s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }
    .skill-slash-line-2 {
      animation: skill-slash-2 0.45s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }
    @keyframes skill-impact {
      0% { transform: scale(0); opacity: 0; }
      40% { transform: scale(1.5); opacity: 1; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    .skill-impact-star {
      animation: skill-impact 0.45s ease-out forwards;
    }
    /* Poison Skill Effect */
    @keyframes skill-poison {
      0% { transform: translateY(20px) scale(0.3); opacity: 0; }
      50% { transform: translateY(0px) scale(1.2); opacity: 0.85; }
      100% { transform: translateY(-20px) scale(0.6); opacity: 0; }
    }
    .skill-poison-bubble {
      animation: skill-poison 0.65s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    /* Gacha Modal Transitions */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fadeIn {
      animation: fadeIn 0.25s ease-out forwards;
    }
    @keyframes scaleIn {
      from { transform: scale(0.9) translateY(10px); }
      to { transform: scale(1) translateY(0); }
    }
    .animate-scaleIn {
      animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* Explore mode biome custom styles */
    .tile-road { background-color: rgba(120, 90, 70, 0.25); border: 1px solid rgba(120, 90, 70, 0.15); }
    .tile-grass { background-color: rgba(16, 185, 129, 0.25); border: 1px solid rgba(16, 185, 129, 0.25); position: relative; }
    .tile-grass::after { content: "🌿"; font-size: 8px; opacity: 0.35; position: absolute; bottom: 1px; right: 1px; }
    .tile-water { background-color: rgba(59, 130, 246, 0.25); border: 1px solid rgba(59, 130, 246, 0.25); position: relative; }
    .tile-water::after { content: "🌊"; font-size: 8px; opacity: 0.35; position: absolute; bottom: 1px; right: 1px; }
    .tile-cave { background-color: rgba(100, 116, 139, 0.25); border: 1px solid rgba(100, 116, 139, 0.25); position: relative; }
    .tile-cave::after { content: "🪨"; font-size: 8px; opacity: 0.35; position: absolute; bottom: 1px; right: 1px; }
    .tile-volcano { background-color: rgba(239, 68, 68, 0.25); border: 1px solid rgba(239, 68, 68, 0.25); position: relative; }
    .tile-volcano::after { content: "🔥"; font-size: 8px; opacity: 0.35; position: absolute; bottom: 1px; right: 1px; }
    .tile-tree { background-color: rgba(6, 78, 59, 0.7); border: 1px solid rgba(6, 78, 59, 0.5); position: relative; }
    .tile-tree::after { content: "🌲"; font-size: 8px; opacity: 0.7; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

    /* Flash Transition Animation for Encounter */
    @keyframes encounter-flash {
      0% { opacity: 0; background-color: white; }
      20% { opacity: 1; background-color: white; }
      40% { opacity: 0; }
      60% { opacity: 1; background-color: #000; }
      80% { opacity: 0; }
      100% { opacity: 1; background-color: #000; }
    }
    .animate-encounter-flash {
      animation: encounter-flash 0.8s ease-in-out forwards;
    }

    /* Player Sprite Pulse Effect */
    @keyframes player-pulse {
      0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); }
      70% { box-shadow: 0 0 0 6px rgba(251, 191, 36, 0); }
      100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
    }
    .player-avatar {
      animation: player-pulse 1.5s infinite;
      z-index: 10;
    }
  </style>
</head>
<body class="bg-[#04060b] text-[#f8f9fa] antialiased selection:bg-[#ffcc01] selection:text-black">

  <!-- React mounting container -->
  <div id="root"></div>

  <!-- Interactive React Core with JSX Babel compilation -->
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // ==================== RPG LEVEL & EXP STORAGE HELPERS ====================
    const STORAGE_KEY = 'pokemon_player_states';
    const GOLD_KEY = 'pokemon_player_gold';
    const UNLOCKED_KEY = 'pokemon_unlocked_ids';

    const DEFAULT_UNLOCKED = [1, 4, 7, 25]; // Bulbasaur, Charmander, Squirtle, Pikachu
    const MAX_POKEMON_COUNT = 251; // Supports Gen 1 + Gen 2

    const getPlayerGold = () => {
      try {
        const raw = localStorage.getItem(GOLD_KEY);
        return raw ? parseInt(raw, 10) : 0;
      } catch (e) {
        return 0;
      }
    };

    // One-time 1000 gold boost for the user
    try {
      const boostKey = 'pokemon_gold_boost_1000_applied';
      const boostApplied = localStorage.getItem(boostKey);
      if (!boostApplied) {
        const raw = localStorage.getItem(GOLD_KEY);
        const goldVal = raw ? parseInt(raw, 10) : 0;
        if (goldVal < 1000) {
          localStorage.setItem(GOLD_KEY, '1000');
        }
        localStorage.setItem(boostKey, 'true');
      }
    } catch (e) {}

    const savePlayerGold = (amount) => {
      try {
        localStorage.setItem(GOLD_KEY, String(amount));
      } catch (e) {}
    };

    const addPlayerGold = (amount) => {
      const current = getPlayerGold();
      const next = current + amount;
      savePlayerGold(next);
      return next;
    };

    const spendPlayerGold = (amount) => {
      const current = getPlayerGold();
      if (current < amount) return false;
      savePlayerGold(current - amount);
      return true;
    };

    const getUnlockedPokemonIds = () => {
      try {
        const raw = localStorage.getItem(UNLOCKED_KEY);
        if (!raw) {
          localStorage.setItem(UNLOCKED_KEY, JSON.stringify(DEFAULT_UNLOCKED));
          return DEFAULT_UNLOCKED;
        }
        return JSON.parse(raw);
      } catch (e) {
        return DEFAULT_UNLOCKED;
      }
    };

    const unlockPokemon = (id) => {
      try {
        const unlocked = getUnlockedPokemonIds();
        if (!unlocked.includes(id)) {
          const nextUnlocked = [...unlocked, id].sort((a, b) => a - b);
          localStorage.setItem(UNLOCKED_KEY, JSON.stringify(nextUnlocked));
        }
      } catch (e) {}
    };

    const isPokemonUnlocked = (id) => {
      return getUnlockedPokemonIds().includes(id);
    };

    const getPokemonRarity = (id) => {
      const legendaries = new Set([144, 145, 146, 150, 151, 243, 244, 245, 249, 250, 251]);
      if (legendaries.has(id)) return 'legendary';

      const epics = new Set([
        3, 6, 9, 12, 15, 18, 26, 31, 34, 36, 40, 45, 62, 65, 68, 71, 76, 94, 
        149, 169, 181, 182, 186, 189, 230, 248
      ]);
      if (epics.has(id)) return 'epic';

      const rares = new Set([
        2, 5, 8, 11, 14, 17, 24, 25, 28, 30, 33, 35, 38, 39, 42, 44, 55, 57, 59, 
        61, 64, 67, 70, 73, 75, 80, 82, 85, 87, 89, 91, 93, 105, 106, 107, 110, 
        112, 117, 119, 121, 130, 134, 135, 136, 148, 162, 164, 166, 168, 171, 
        176, 178, 180, 184, 188, 192, 195, 196, 197, 199, 205, 208, 210, 212, 
        217, 219, 221, 229, 232, 233, 237, 247
      ]);
      if (rares.has(id)) return 'rare';

      return 'normal';
    };

    const RARITY_WEIGHTS = {
      normal: 50,
      rare: 30,
      epic: 15,
      legendary: 5
    };

    const getGachaDrawCount = () => {
      try {
        const raw = localStorage.getItem('pokemon_gacha_draw_count');
        return raw ? parseInt(raw, 10) : 0;
      } catch (e) {
        return 0;
      }
    };

    const saveGachaDrawCount = (count) => {
      try {
        localStorage.setItem('pokemon_gacha_draw_count', String(count));
      } catch (e) {}
    };

    const getEpicTickets = () => {
      try {
        const raw = localStorage.getItem('pokemon_gacha_epic_tickets');
        return raw ? parseInt(raw, 10) : 0;
      } catch (e) {
        return 0;
      }
    };

    const saveEpicTickets = (count) => {
      try {
        localStorage.setItem('pokemon_gacha_epic_tickets', String(count));
      } catch (e) {}
    };

    const drawRandomPokemon = (useTicket) => {
      if (useTicket) {
        const tickets = getEpicTickets();
        if (tickets < 1) return -1; // No tickets available
      } else {
        const gold = getPlayerGold();
        if (gold < 10) return -2; // Insufficient gold
      }

      // Define drawing pool
      const allIds = Array.from({ length: MAX_POKEMON_COUNT }, (_, i) => i + 1);
      let candidates = allIds;
      
      if (useTicket) {
        // Only Epic & Legendary Pokemons
        candidates = allIds.filter(id => {
          const rarity = getPokemonRarity(id);
          return rarity === 'epic' || rarity === 'legendary';
        });
      }

      // Calculate total weight of candidates
      let totalWeight = 0;
      const candidatesWithWeights = candidates.map(id => {
        const rarity = getPokemonRarity(id);
        const weight = RARITY_WEIGHTS[rarity];
        totalWeight += weight;
        return { id, weight };
      });

      // Pick weighted random candidate
      let randomVal = Math.random() * totalWeight;
      let drawnId = candidates[0]; // fallback
      for (const item of candidatesWithWeights) {
        randomVal -= item.weight;
        if (randomVal <= 0) {
          drawnId = item.id;
          break;
        }
      }

      // Deduct resources
      if (useTicket) {
        saveEpicTickets(getEpicTickets() - 1);
      } else {
        spendPlayerGold(10);
      }

      // Check duplicate status
      const unlocked = getUnlockedPokemonIds();
      const isDuplicate = unlocked.includes(drawnId);
      let ticketEarned = false;

      if (isDuplicate) {
        // Already unlocked -> Level Up!
        const state = getPlayerPokemonState(drawnId);
        savePlayerPokemonState(drawnId, { level: state.level + 1, exp: state.exp });
      } else {
        // New unlock!
        unlockPokemon(drawnId);
      }

      // Update draw count and award tickets
      if (!useTicket) {
        const nextCount = getGachaDrawCount() + 1;
        saveGachaDrawCount(nextCount);
        if (nextCount > 0 && nextCount % 30 === 0) {
          saveEpicTickets(getEpicTickets() + 1);
          ticketEarned = true;
        }
      }

      return { id: drawnId, isDuplicate, ticketEarned };
    };

    const BALLS_KEY = 'pokemon_ball_inventory';
    const EQUIPPED_BALL_KEY = 'pokemon_equipped_ball';

    const getBallInventory = () => {
      try {
        const raw = localStorage.getItem(BALLS_KEY);
        if (!raw) {
          const initial = { pokeball: 999, greatball: 3, ultraball: 1 };
          localStorage.setItem(BALLS_KEY, JSON.stringify(initial));
          return initial;
        }
        return JSON.parse(raw);
      } catch (e) {
        return { pokeball: 999, greatball: 3, ultraball: 1 };
      }
    };

    const saveBallInventory = (inv) => {
      try {
        localStorage.setItem(BALLS_KEY, JSON.stringify(inv));
      } catch (e) {}
    };

    const getEquippedBall = () => {
      try {
        return localStorage.getItem(EQUIPPED_BALL_KEY) || 'pokeball';
      } catch (e) {
        return 'pokeball';
      }
    };

    const saveEquippedBall = (ball) => {
      try {
        localStorage.setItem(EQUIPPED_BALL_KEY, ball);
      } catch (e) {}
    };

    const buyBall = (ballType, cost) => {
      const gold = getPlayerGold();
      if (gold < cost) return false;
      
      spendPlayerGold(cost);
      const inv = getBallInventory();
      inv[ballType] = (inv[ballType] || 0) + 1;
      saveBallInventory(inv);
      return true;
    };

    const consumeEquippedBall = () => {
      const ball = getEquippedBall();
      if (ball === 'pokeball') return; // Infinite
      
      const inv = getBallInventory();
      if (inv[ball] > 0) {
        inv[ball]--;
        saveBallInventory(inv);
        if (inv[ball] === 0) {
          saveEquippedBall('pokeball'); // fallback
        }
      }
    };

    const getPlayerPokemonState = (id) => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const states = raw ? JSON.parse(raw) : {};
        return states[id] || { level: 1, exp: 0 };
      } catch (e) {
        return { level: 1, exp: 0 };
      }
    };

    const savePlayerPokemonState = (id, state) => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const states = raw ? JSON.parse(raw) : {};
        states[id] = state;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(states));
      } catch (e) {}
    };

    const getRequiredExpForNextLevel = (level) => {
      return level * 100;
    };

    const addExperience = (id, amount) => {
      const before = getPlayerPokemonState(id);
      let level = before.level;
      let exp = before.exp + amount;
      let leveledUp = false;

      while (exp >= getRequiredExpForNextLevel(level)) {
        exp -= getRequiredExpForNextLevel(level);
        level += 1;
        leveledUp = true;
      }

      const after = { level, exp };
      savePlayerPokemonState(id, after);

      return {
        before,
        after,
        leveledUp,
        earnedExp: amount
      };
    };

    const CHAMP_COOLDOWN_KEY = 'pokemon_championship_cooldown_until';

    const getChampCooldownUntil = () => {
      try { return parseInt(localStorage.getItem(CHAMP_COOLDOWN_KEY) || '0', 10); } catch(e) { return 0; }
    };
    const setChampCooldown = () => {
      try {

        localStorage.setItem(CHAMP_COOLDOWN_KEY, String(until));
      } catch(e) {}
    };
    const clearChampCooldown = () => {
      try { localStorage.removeItem(CHAMP_COOLDOWN_KEY); } catch(e) {}
    };
    const isChampOnCooldown = () => {
      return Date.now() < getChampCooldownUntil();
    };

      const ms = Math.max(0, getChampCooldownUntil() - Date.now());
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      const s = Math.floor((ms % 60000) / 1000);
      return `${h}시간 ${m}분 ${s}초`;

      const combined = [...legendPool, ...epicPool, ...legendPool]; // 전설 가중치 높임
      const picked = [];
      while (picked.length < 5) {
        const id = combined[Math.floor(Math.random() * combined.length)];
        if (!picked.find(e => e.id === id)) {
          const level = 75 + Math.floor(Math.random() * 8); // 75~82
          picked.push({ id, level });

    const getMovesForPokemon = (types) => {
      const selected = [];
      const lTypes = types.map(t => t.toLowerCase());

      const match = [];
      const norm = [];
      const other = [];

      Object.entries(localMoveDatabase).forEach(([name, entry]) => {
        if (lTypes.includes(entry.type)) match.push({ name, ...entry });
        else if (entry.type === 'normal') norm.push({ name, ...entry });
        else other.push({ name, ...entry });
      });

      const add = (m) => {
        if (selected.some(s => s.name === m.name)) return;
        selected.push({
          name: m.name,
          koreanName: pokemonMoveTranslations[m.name] || m.name,
          power: m.power,
          accuracy: m.accuracy,
          type: m.type,
          pp: m.pp,
          maxPp: m.pp
        });
      };

      const shuf = (arr) => [...arr].sort(() => Math.random() - 0.5);
      const sMatch = shuf(match);
      const sNorm = shuf(norm);
      const sOther = shuf(other);

      sMatch.slice(0, 2).forEach(add);
      sNorm.slice(0, 1).forEach(add);

      const comb = [...sMatch, ...sNorm, ...sOther];
      for (let i = 0; i < comb.length && selected.length < 4; i++) {
        add(comb[i]);
      }

      while (selected.length < 4) {
        add({ name: 'tackle', power: 40, accuracy: 100, type: 'normal', pp: 35 });
      }
      return selected;
    };

    // ==================== B. WEB AUDIO SYNTHESIZER ====================
    class SoundManager {
      constructor() {
        this.ctx = null;
        this.isMuted = localStorage.getItem('pokemon_battle_muted') === 'true';
      }
      initContext() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') this.ctx.resume();
        return this.ctx;
      }
      setMute(m) {
        this.isMuted = m;
        localStorage.setItem('pokemon_battle_muted', String(m));
      }
      toggleMute() {
        this.setMute(!this.isMuted);
        return this.isMuted;
      }
      playTone(freq, type, duration, offset = 0, vol = 0.1) {
        if (this.isMuted) return;
        try {
          const ctx = this.initContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, ctx.currentTime + offset);
          gain.gain.setValueAtTime(vol, ctx.currentTime + offset);
          gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + offset + duration);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(ctx.currentTime + offset);
          osc.stop(ctx.currentTime + offset + duration);
        } catch (e) {
          console.warn('Audio play block:', e);
        }
      }
      playSelect() {
        this.playTone(880, 'square', 0.08, 0, 0.05);
      }
      playHit() {
        if (this.isMuted) return;
        try {
          const ctx = this.initContext();
          const size = ctx.sampleRate * 0.12;
          const buf = ctx.createBuffer(1, size, ctx.sampleRate);
          const data = buf.getChannelData(0);
          for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;

          const source = ctx.createBufferSource();
          source.buffer = buf;

          const filter = ctx.createBiquadFilter();
          filter.type = 'bandpass';
          filter.frequency.setValueAtTime(450, ctx.currentTime);
          filter.Q.setValueAtTime(2.5, ctx.currentTime);

          const gain = ctx.createGain();
          gain.gain.setValueAtTime(0.12, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.12);

          source.connect(filter);
          filter.connect(gain);
          gain.connect(ctx.destination);
          source.start();
          this.playTone(160, 'square', 0.1, 0, 0.08);
        } catch (e) {
          this.playTone(200, 'sawtooth', 0.12, 0, 0.1);
        }
      }
      playTypeSound(type) {
        if (this.isMuted) return;
        const lowerType = type.toLowerCase();
        try {
          const ctx = this.initContext();
          if (lowerType === 'fire') {
            const dur = 0.45;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(180, ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, ctx.currentTime + dur);
            
            const size = ctx.sampleRate * dur;
            const buf = ctx.createBuffer(1, size, ctx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
            const noise = ctx.createBufferSource();
            noise.buffer = buf;
            
            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(300, ctx.currentTime);
            filter.frequency.linearRampToValueAtTime(80, ctx.currentTime + dur);
            
            const nGain = ctx.createGain();
            nGain.gain.setValueAtTime(0.15, ctx.currentTime);
            nGain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
            
            noise.connect(filter);
            filter.connect(nGain);
            nGain.connect(ctx.destination);
            noise.start();

            gain.gain.setValueAtTime(0.12, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + dur);
          } else if (lowerType === 'water') {
            for (let i = 0; i < 3; i++) {
              const start = ctx.currentTime + i * 0.08;
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.type = 'sine';
              osc.frequency.setValueAtTime(250 + i * 80, start);
              osc.frequency.exponentialRampToValueAtTime(900 + i * 100, start + 0.09);
              gain.gain.setValueAtTime(0.06, start);
              gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.09);
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.start(start);
              osc.stop(start + 0.1);
            }
          } else if (lowerType === 'electric') {
            for (let i = 0; i < 4; i++) {
              const start = ctx.currentTime + i * 0.06;
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.type = 'triangle';
              osc.frequency.setValueAtTime(Math.random() * 400 + 100, start);
              gain.gain.setValueAtTime(0.09, start);
              gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.05);
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.start(start);
              osc.stop(start + 0.06);
            }
          } else if (lowerType === 'grass') {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(600, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.16);
          } else if (lowerType === 'psychic') {
            const dur = 0.55;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(880, ctx.currentTime + dur * 0.5);
            osc.frequency.linearRampToValueAtTime(220, ctx.currentTime + dur);
            
            const mod = ctx.createOscillator();
            const modGain = ctx.createGain();
            mod.frequency.value = 15;
            modGain.gain.value = 30;
            mod.connect(modGain);
            modGain.connect(osc.frequency);
            
            gain.gain.setValueAtTime(0.08, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            mod.start();
            osc.stop(ctx.currentTime + dur);
            mod.stop(ctx.currentTime + dur);
          } else if (lowerType === 'ice') {
            const notes = [1500, 2000, 2500];
            notes.forEach((f, idx) => {
              const start = ctx.currentTime + idx * 0.04;
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.type = 'sine';
              osc.frequency.setValueAtTime(f, start);
              gain.gain.setValueAtTime(0.04, start);
              gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.12);
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.start(start);
              osc.stop(start + 0.15);
            });
          } else if (lowerType === 'ghost' || lowerType === 'dark') {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(110, ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(50, ctx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.12, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.4);
            
            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 250;
            
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.4);
          } else {
            this.playHit();
          }
        } catch (e) {
          this.playHit();
        }
      }
      playSuperEffective() {
        this.playHit();
        setTimeout(() => this.playTone(80, 'sawtooth', 0.22, 0, 0.2), 30);

        if (this.isMuted) return;

      const [display, setDisplay] = useState('');
      useEffect(() => {
        setDisplay('');
        if (!text) return;
        let idx = 0;
        const t = setInterval(() => {
          setDisplay((prev) => prev + text.charAt(idx));
          idx++;
          if (idx >= text.length) clearInterval(t);
        }, speed);
        return () => clearInterval(t);
      }, [text, speed]);

      return (
        <span className="font-semibold">{display}</span>
      );
    };

        await new Promise(r => setTimeout(r, 600));

        if (Math.random() * 100 > move.accuracy) {
          setBattleLogs(prev => [...prev, `${player.koreanName}의 공격은 빗나갔다!`]);
          setActiveAnim({ type: null });
          setIsAnimating(false);
          setTimeout(() => setTurn('enemy'), 800);
          return;
        }

        // 3. Stats & Critical (6.25%)
        const pAtk = scaleStat(player.stats.attack, playerLevel);
        const eDef = scaleStat(enemy.stats.defense, enemyLevel);
        const isCrit = Math.random() < 0.0625;
        const { multiplier, message } = getTypeEffectiveness(move.type, enemy.types);

        sound.playTypeSound(move.type);
        if (multiplier > 1.0) {
          setTimeout(() => sound.playTone(80, 'sawtooth', 0.22, 0, 0.15), 50);
        }

        // Formula
        const critMult = isCrit ? 1.5 : 1.0;
        const rand = Math.random() * (1.0 - 0.85) + 0.85;
        const baseDmg = Math.floor(((2 * playerLevel / 5 + 2) * move.power * (pAtk / eDef)) / 50 + 2);
        const damage = Math.max(1, Math.floor(baseDmg * critMult * multiplier * rand));

        // Shake anim & skill overlay
        setActiveAnim({ type: 'enemy-damage', moveType: move.type });
        const nextHP = Math.max(0, enemyHP - damage);
        setEnemyHP(nextHP);

        if (isCrit) setBattleLogs(prev => [...prev, '급소에 맞았다!']);
        if (message) setBattleLogs(prev => [...prev, message]);
        setBattleLogs(prev => [...prev, `${enemy.koreanName}에게 ${damage}의 피해!`]);

        // If move.type === 'poison', apply poison to enemy if enemy is not poison type and not already poisoned
        let nextEnemyStatus = enemyStatus;
        const isEnemyPoisonType = enemy.types.some(t => t.toLowerCase() === 'poison' || t.toLowerCase() === 'steel');
        if (move.type.toLowerCase() === 'poison' && !isEnemyPoisonType && !enemyStatus) {
          nextEnemyStatus = 'poison';
          setEnemyStatus('poison');
          setBattleLogs(prev => [...prev, `${enemy.koreanName}은(는) 독에 중독되었다!`]);
        }

        await new Promise(r => setTimeout(r, 800));
        setActiveAnim({ type: null });

        // Check Battle End
        if (nextHP <= 0) {
          handleBattleEnd('player');
        } else {
          // Play Poison DoT damage step if enemy is poisoned!
          if (nextEnemyStatus === 'poison') {
            await new Promise(r => setTimeout(r, 600));
            const dotDmg = Math.max(2, Math.floor(enemyMaxHP / 16));
            const postPoisonHP = Math.max(0, nextHP - dotDmg);
            setEnemyHP(postPoisonHP);
            setBattleLogs(prev => [...prev, `상대 ${enemy.koreanName}은(는) 독의 피해를 입었다!`]);
            sound.playTypeSound('poison');
            setActiveAnim({ type: 'enemy-damage', moveType: 'poison' });
            await new Promise(r => setTimeout(r, 800));
            setActiveAnim({ type: null });

            if (postPoisonHP <= 0) {
              handleBattleEnd('player');
              return;
            }
          }
          setIsAnimating(false);
          setTurn('enemy');
        }
      };

      const enemyAttack = useCallback(async () => {
        if (isAnimating || turn !== 'enemy' || playerHP <= 0) return;
        setIsAnimating(true);
        setTurn('idle');

        const move = enemy.moves[Math.floor(Math.random() * enemy.moves.length)];

        // 1. Dash anim
        setActiveAnim({ type: 'enemy-attack', moveName: move.koreanName });
        setBattleLogs(prev => [...prev, `상대 ${enemy.koreanName}의 ${move.koreanName}!`]);

        await new Promise(r => setTimeout(r, 600));

        // 2. Accuracy check
        if (Math.random() * 100 > move.accuracy) {
          setBattleLogs(prev => [...prev, `상대 ${enemy.koreanName}의 공격은 빗나갔다!`]);
          setActiveAnim({ type: null });
          setIsAnimating(false);
          setTimeout(() => setTurn('player'), 800);
          return;
        }

        // 3. Stats & Critical (6.25%)
        const eAtk = scaleStat(enemy.stats.attack, enemyLevel);
        const pDef = scaleStat(player.stats.defense, playerLevel);
        const isCrit = Math.random() < 0.0625;
        const { multiplier, message } = getTypeEffectiveness(move.type, player.types);

        sound.playTypeSound(move.type);
        if (multiplier > 1.0) {
          setTimeout(() => sound.playTone(80, 'sawtooth', 0.22, 0, 0.15), 50);
        }

        const critMult = isCrit ? 1.5 : 1.0;
        const rand = Math.random() * (1.0 - 0.85) + 0.85;
        const baseDmg = Math.floor(((2 * enemyLevel / 5 + 2) * move.power * (eAtk / pDef)) / 50 + 2);
        const damage = Math.max(1, Math.floor(baseDmg * critMult * multiplier * rand));

        // Shake & skill overlay
        setActiveAnim({ type: 'player-damage', moveType: move.type });
        const nextHP = Math.max(0, playerHP - damage);
        setPlayerHP(nextHP);

        if (isCrit) setBattleLogs(prev => [...prev, '급소에 맞았다!']);
        if (message) setBattleLogs(prev => [...prev, message]);
        setBattleLogs(prev => [...prev, `${player.koreanName}은(는) ${damage}의 피해를 입었다!`]);

        // If move.type === 'poison', apply poison to player if player is not poison type and not already poisoned
        let nextPlayerStatus = playerStatus;
        const isPlayerPoisonType = player.types.some(t => t.toLowerCase() === 'poison' || t.toLowerCase() === 'steel');
        if (move.type.toLowerCase() === 'poison' && !isPlayerPoisonType && !playerStatus) {
          nextPlayerStatus = 'poison';
          setPlayerStatus('poison');
          setBattleLogs(prev => [...prev, `${player.koreanName}은(는) 독에 중독되었다!`]);
        }

        await new Promise(r => setTimeout(r, 800));
        setActiveAnim({ type: null });

        // Check Battle End
        if (nextHP <= 0) {
          handleBattleEnd('enemy');
        } else {
          // Play Poison DoT damage step if player is poisoned!
          if (nextPlayerStatus === 'poison') {
            await new Promise(r => setTimeout(r, 600));
            const dotDmg = Math.max(2, Math.floor(playerMaxHP / 16));
            const postPoisonHP = Math.max(0, nextHP - dotDmg);
            setPlayerHP(postPoisonHP);
            setBattleLogs(prev => [...prev, `${player.koreanName}은(는) 독의 피해를 입었다!`]);
            sound.playTypeSound('poison');
            setActiveAnim({ type: 'player-damage', moveType: 'poison' });
            await new Promise(r => setTimeout(r, 800));
            setActiveAnim({ type: null });

            if (postPoisonHP <= 0) {
              handleBattleEnd('enemy');
              return;
            }
          }
          setIsAnimating(false);
          setTurn('player');
        }
      }, [isAnimating, turn, playerHP, enemy, player]);

      // Handle AI Turn triggers
      useEffect(() => {
        if ((view === 'battle' || view === 'championship-battle') && turn === 'enemy' && !isAnimating) {
          const t = setTimeout(() => {
            enemyAttack();
          }, 1200);
          return () => clearTimeout(t);
        }
      }, [view, turn, isAnimating, enemyAttack]);

      // EXP bar filling animation on battle end (Standalone HTML)
      useEffect(() => {
        if (winner !== null && player) {
          const prevLevel = leveledUp ? playerLevel - 1 : playerLevel;
          const prevReqExp = prevLevel * 100;
          const startPct = (expBefore / prevReqExp) * 100;
          const endPct = leveledUp ? 100 : (expAfter / (playerLevel * 100)) * 100;

          setResultExpPct(startPct);

          const timer = setTimeout(() => {
            setResultExpPct(endPct);
          }, 500);

          return () => clearTimeout(timer);
        } else {
          setResultExpPct(0);
        }
      }, [winner, player, expBefore, expAfter, playerLevel, leveledUp]);
      const handleBattleEnd = (winnerStr) => {
        // In championship-battle mode, handle team switching instead of full battle end
        if (view === 'championship-battle') {
          setIsAnimating(false);
          setTurn('idle');
          if (winnerStr === 'player') {
            // Opponent pokemon fainted
            setBattleLogs(prev => [...prev, `${enemy.koreanName}은(는) 쓰러졌다!`]);
            setEnemyReleaseState('recall'); // 상대 포켓몬 몬스터볼 복귀 모션 시작
            setTimeout(() => handleChampPokemonFaint('enemy'), 1200);
          } else {
            // Player pokemon fainted
            setBattleLogs(prev => [...prev, `${player.koreanName}은(는) 쓰러졌다...`, `수고했어, ${player.koreanName}!`]);
            setReleaseState('recall'); // GBA식 몬스터볼 복귀 모션 시작
            setTimeout(() => handleChampPokemonFaint('player'), 1200);
          }
          return;
        }

        setWinner(winnerStr);
        setIsAnimating(false);
        setTurn('idle');

        const isWin = winnerStr === 'player';

        // Explore Mode Capture Process
        if (isWin && exploreActive) {
          const isDuplicate = isPokemonUnlocked(enemy.id);
          if (isDuplicate) {
            const pState = getPlayerPokemonState(enemy.id);
            const nextLevel = pState.level + 1;
            savePlayerPokemonState(enemy.id, { level: nextLevel, exp: 0 });
            setExploreCapturedNew(false);
          } else {
            unlockPokemon(enemy.id);
            setExploreCapturedNew(true);
          }
          setUnlockedIds(getUnlockedPokemonIds());
        }
        const baseXP = isWin ? Math.floor(Math.random() * 41) + 80 : Math.floor(Math.random() * 21) + 20;
        const multiplier = usedBall === 'greatball' ? 1.2 : usedBall === 'ultraball' ? 1.5 : 1.0;
        const xp = Math.floor(baseXP * multiplier);
        const expResult = addExperience(player.id, xp);

        // Gold rewards calculations
        const earnedG = isWin ? 2 : 1;
        const finalGold = addPlayerGold(earnedG);
        setGold(finalGold);
        setEarnedGold(earnedG);

        setEarnedExp(expResult.earnedExp);
        setExpBefore(expResult.before.exp);
        setExpAfter(expResult.after.exp);
        setPlayerLevel(expResult.after.level);
        setLeveledUp(expResult.leveledUp);

        if (isWin) {
          setBattleLogs(prev => [
            ...prev, 
            `${enemy.koreanName}은(는) 쓰러졌다!`, 
            '배틀에서 승리했다!',
            `${xp} EXP를 획득했다! ${multiplier > 1.0 ? `(${multiplier === 1.2 ? '슈퍼볼' : '하이퍼볼'} 보너스 +${Math.round((multiplier - 1) * 100)}%)` : ''}`,
            `${earnedG} 골드를 획득했다!`
          ]);
          if (expResult.leveledUp) {
            setBattleLogs(prev => [...prev, `${player.koreanName}은(는) Lv.${expResult.after.level}(으)로 레벨업했다!`]);
          }
          sound.playVictory();
          if (getPokemonRarity(enemy.id) === 'legendary') {
            triggerConfetti();
            setTimeout(triggerConfetti, 600);
            setTimeout(triggerConfetti, 1200);
          } else {
            triggerConfetti();
          }
        } else {
          setBattleLogs(prev => [
            ...prev, 
            `${player.koreanName}은(는) 쓰러졌다...`, 
            '눈앞이 캄캄해졌다!',
            `${xp} EXP를 획득했다. ${multiplier > 1.0 ? `(${multiplier === 1.2 ? '슈퍼볼' : '하이퍼볼'} 보너스 +${Math.round((multiplier - 1) * 100)}%)` : ''}`,
            `${earnedG} 골드를 획득했다.`
          ]);
          if (expResult.leveledUp) {
            setBattleLogs(prev => [...prev, `${player.koreanName}은(는) Lv.${expResult.after.level}(으)로 레벨업했다!`]);
          }
          sound.playDefeat();
        }

        // Save battle history
        try {
          const record = {
            id: Math.random().toString(36).substr(2, 9),
            date: new Date().toLocaleDateString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
            playerPokemonName: player.koreanName,
            enemyPokemonName: enemy.koreanName,
            playerPokemonSprite: player.sprites.front_default,
            enemyPokemonSprite: enemy.sprites.front_default,
            result: winnerStr === 'player' ? 'WIN' : 'LOSE',
            turnsCount: Math.floor((battleLogs.length + 3) / 2)
          };
          const nextHist = [record, ...historyList].slice(0, 10);
          setHistoryList(nextHist);
          localStorage.setItem('pokemon_battle_history', JSON.stringify(nextHist));
        } catch (e) {}
      };

      const handleRetreat = () => {
        sound.playSelect();
        if (view === 'championship-battle') {
          setChampCooldown(); // 챔피언십 도중 퇴장(기권) 시에도 24시간 쿨다운 패널티 적용
        }
        if (exploreActive) {
          setView('explore');
          setExploreActive(false);
          setExploreEncounterBiome(null);
        } else {
          setView('select');
        }
        setSelectedPokemon(null);
      };

      // Explore Mode Move Action
      const handleExploreMove = (dx, dy) => {
        const targetX = exploreX + dx;
        const targetY = exploreY + dy;

        // 1. Bound check
        if (targetY < 0 || targetY >= exploreMap.length || targetX < 0 || targetX >= exploreMap[0].length) {
          return;
        }

        // 2. Obstacle check
        const tile = exploreMap[targetY][targetX];
        if (tile === 9) {
          return;
        }

        // 3. Portal/Entrance (tile === 8) check
        if (tile === 8) {
          sound.playTone(220, 'sine', 0.1, 0, 0.05);
          sound.playTone(440, 'sine', 0.1, 0.08, 0.05);
          sound.playTone(880, 'sine', 0.2, 0.16, 0.1);

          if (explorePrevMap === null) {
            // 성역으로 진입
            let sanctuaryMap = MIX_SANCTUARY_MAP;
            let bannerName = "신비로운 시공의 틈 성역";
            if (exploreMap === FOREST_MAP) {
              sanctuaryMap = FOREST_SANCTUARY_MAP;
              bannerName = "시간의 숲 성역 (Celebi's Shrine)";
            } else if (exploreMap === OCEAN_MAP) {
              sanctuaryMap = OCEAN_SANCTUARY_MAP;
              bannerName = "심해의 해저 동굴 (Lugia's Trench)";
            } else if (exploreMap === VOLCANO_MAP) {
              sanctuaryMap = VOLCANO_SANCTUARY_MAP;
              bannerName = "무지개빛 화산 꼭대기 (Ho-Oh's Peak)";
            } else if (exploreMap === CAVE_MAP) {
              sanctuaryMap = CAVE_SANCTUARY_MAP;
              bannerName = "뮤츠의 숨겨진 실험실 (Mewtwo's Lab)";
            }

            setExplorePrevMap(exploreMap);
            // 진입 직전의 위치(포탈 밟기 전 안전한 위치)를 백업
            setExplorePrevX(exploreX);
            setExplorePrevY(exploreY);
            
            setExploreMap(sanctuaryMap);
            setExploreX(7);
            setExploreY(9); // 성역 맵의 시작 위치

            setExploreSanctuaryBanner(bannerName);
            setTimeout(() => setExploreSanctuaryBanner(null), 3000); // 3초 후 배너 제거
          } else {
            // 성역에서 일반 월드로 복귀
            setExploreMap(explorePrevMap);
            setExploreX(explorePrevX);
            setExploreY(explorePrevY);

            setExplorePrevMap(null);
            setExplorePrevX(null);
            setExplorePrevY(null);
          }
          return;
        }

        setExploreX(targetX);
        setExploreY(targetY);
        sound.playTone(180, 'triangle', 0.05, 0, 0.02);

        // 4. Encounter check (Grass, Water, Cave, Volcano)
        if (tile === 1 || tile === 2 || tile === 3 || tile === 4) {
          // 성역 안이면 조우율을 4%로 매우 낮추어 희귀성 보정, 밖이면 일반 조우율 10~12% 적용
          const isSanctuary = explorePrevMap !== null;
          const encounterRate = isSanctuary 
            ? 0.04 
            : (tile === 2 || tile === 4 ? 0.12 : 0.10);

          if (Math.random() < encounterRate) {
            triggerExploreEncounter(tile);
          }
        }
      };

      // Trigger Explore Wild Encounter
      const triggerExploreEncounter = async (tileType) => {
        setExploreEncounterBiome(tileType);
        setExploreEncountering(true);
        sound.playTone(120, 'sawtooth', 0.1, 0, 0.05);
        sound.playTone(80, 'sawtooth', 0.1, 0.1, 0.05);
        sound.playTone(60, 'sawtooth', 0.2, 0.2, 0.1);

        // 성역 내부이면 전설의 포켓몬 100% 강제 고정
        const isSanctuary = explorePrevMap !== null;
        let rarity = 'normal';
        if (isSanctuary || exploreLegendaryHunt) {
          rarity = 'legendary';
        } else {
          const rand = Math.random() * 100;
          if (rand < 0.5) rarity = 'legendary';
          else if (rand < 15) rarity = 'epic';
          else if (rand < 50) rarity = 'rare';
        }

        const biome = EXPLORE_BIOME_POKEMON[tileType];
        let idList = biome[rarity];
        if (!idList || idList.length === 0) {
          idList = biome.normal;
        }

        const wildId = idList[Math.floor(Math.random() * idList.length)];

        setTimeout(async () => {
          setExploreActive(true);
          
          const unlocked = unlockedIds.length > 0 ? unlockedIds : [25];
          const activePlayerId = selectedPokemon ? selectedPokemon.id : (unlocked.includes(equippedBall) ? equippedBall : unlocked[0]);

          const myPokemonObj = await fetchPokemonDetails(activePlayerId);
          const pState = getPlayerPokemonState(myPokemonObj.id);
          const pLevel = pState.level;

          // 성역 내부이거나 전설 모드이면 보스 레벨 스케일링(+5 ~ +12) 적용
          const eLevel = (isSanctuary || exploreLegendaryHunt)
            ? Math.max(1, pLevel + Math.floor(Math.random() * 8) + 5)
            : Math.max(1, pLevel + Math.floor(Math.random() * 7) - 3);

          const scaleHP = (base, lv) => Math.floor(((2 * base + 31) * lv) / 100) + lv + 10;
          const wildPokemonObj = await fetchPokemonDetails(wildId);

          const pMax = scaleHP(myPokemonObj.stats.hp, pLevel);
          const eMax = scaleHP(wildPokemonObj.stats.hp, eLevel);

          const eqBall = getEquippedBall();
          const inv = getBallInventory();
          const activeBall = (eqBall !== 'pokeball' && inv[eqBall] <= 0) ? 'pokeball' : eqBall;
          setUsedBall(activeBall);
          consumeEquippedBall();
          setBallInventory(getBallInventory());
          setEquippedBall(getEquippedBall());

          setPlayer(myPokemonObj);
          setEnemy(wildPokemonObj);
          setPlayerLevel(pLevel);
          setEnemyLevel(eLevel);
          setPlayerHP(pMax);
          setEnemyHP(eMax);
          setPlayerMaxHP(pMax);
          setEnemyMaxHP(eMax);
          setPlayerStatus(null);
          setEnemyStatus(null);
          setWinner(null);
          setGold(getPlayerGold());
          setEarnedGold(0);

          const ballNameKo = activeBall === 'greatball' ? '슈퍼볼' : activeBall === 'ultraball' ? '하이퍼볼' : '몬스터볼';
          setBattleLogs([
            `야생의 Lv.${eLevel} ${wildPokemonObj.koreanName}(이)가 나타났다!`,
            `${ballNameKo}로 Lv.${pLevel} ${myPokemonObj.koreanName}(이)가 나섰다!`
          ]);

          setReleaseState('roll');
          const wiggleTimer = setTimeout(() => {
            setReleaseState('wiggle');
            sound.playTone(300, 'triangle', 0.08, 0, 0.04);
          }, 800);
          const openTimer = setTimeout(() => {
            setReleaseState('open');
            sound.playTone(600, 'sine', 0.15, 0, 0.08);
          }, 1400);
          const releaseTimer = setTimeout(() => {
            setReleaseState('released');
          }, 1800);

          setEnemyReleaseState('released');

          setView('battle');
          setExploreEncountering(false);
        }, 800);
      };

      // keyboard input for explore mode
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (view !== 'explore' || exploreEncountering) return;

          let dx = 0;
          let dy = 0;

          if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
            dy = -1;
          } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
            dy = 1;
          } else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
            dx = -1;
          } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
            dx = 1;
          }

          if (dx !== 0 || dy !== 0) {
            e.preventDefault();
            handleExploreMove(dx, dy);
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [view, exploreX, exploreY, exploreEncountering, exploreMap, explorePrevMap]);

      const handleRetrySame = () => {
        sound.playSelect();
        const pState = getPlayerPokemonState(player.id);
        const pLevel = pState.level;
        const eLevel = Math.max(1, pLevel + Math.floor(Math.random() * 3) - 1);

        setPlayerLevel(pLevel);
        setEnemyLevel(eLevel);

        // Retrieve equipped ball and verify inventory
        const eqBall = getEquippedBall();
        const inv = getBallInventory();
        const activeBall = (eqBall !== 'pokeball' && inv[eqBall] <= 0) ? 'pokeball' : eqBall;
        setUsedBall(activeBall);
        consumeEquippedBall();
        // Refresh local shop states
        setBallInventory(getBallInventory());
        setEquippedBall(getEquippedBall());

        const scaleHP = (base, lv) => Math.floor(((2 * base + 31) * lv) / 100) + lv + 10;

        const pMax = scaleHP(player.stats.hp, pLevel);
        const eMax = scaleHP(enemy.stats.hp, eLevel);

        setPlayerHP(pMax);
        setEnemyHP(eMax);
        setPlayerMaxHP(pMax);
        setEnemyMaxHP(eMax);
        setPlayerStatus(null);
        setEnemyStatus(null);
        setWinner(null);
        setEarnedExp(0);
        setExpBefore(0);
        setExpAfter(0);
        setLeveledUp(false);
        setGold(getPlayerGold());
        setEarnedGold(0);
        
        const ballNameKo = activeBall === 'greatball' ? '슈퍼볼' : activeBall === 'ultraball' ? '하이퍼볼' : '몬스터볼';
        setBattleLogs([
          `야생의 Lv.${eLevel} ${enemy.koreanName}(이)가 다시 나타났다!`, 
          `${ballNameKo}에서 Lv.${pLevel} ${player.koreanName}(이)가 나왔다!`
        ]);
        setTurn(player.stats.speed >= enemy.stats.speed ? 'player' : 'enemy');
      };

      const handleClearRecords = () => {
        sound.playSelect();
        if (window.confirm('모든 대전 전적 기록을 지우시겠습니까?')) {
          localStorage.removeItem('pokemon_battle_history');
          setHistoryList([]);
        }
      };

                        <button
                          onClick={() => handleExploreMove(1, 0)}
                          className="bg-slate-800 hover:bg-slate-700 active:bg-slate-600 border border-slate-700 active:translate-y-0.5 rounded flex items-center justify-center cursor-pointer shadow-sm text-slate-300 font-bold text-xs"
                          title="오른쪽"
                        >
                          ▶
                        </button>
                        
                        <div />
                        <button
                          onClick={() => handleExploreMove(0, 1)}
                          className="bg-slate-800 hover:bg-slate-700 active:bg-slate-600 border border-slate-700 active:translate-y-0.5 rounded flex items-center justify-center cursor-pointer shadow-sm text-slate-300 font-bold text-xs"
                          title="아래로"
                        >
                          ▼
                        </button>
                        <div />
                      </div>
                    </div>

                    {/* Explanatory Help Badge */}
                    <div className="hidden md:flex flex-col text-[7px] font-pixel text-slate-400 select-none text-right gap-1 max-w-[180px]">
                      <span>⌨️ 방향키(Arrow Keys / WASD) 조작 가능</span>
                      <span className="text-amber-500/80">풀숲/물가/동굴/화산 타일 이동 시 조우 확률 작동</span>
                    </div>

                  </footer>
                </div>
              )}

            </div>

            {/* Console Bottom Brand */}
            <div className="flex justify-between items-center px-4 pt-3 text-slate-500 font-pixel text-[7px] select-none tracking-widest font-extrabold uppercase">
              <span>Dot Matrix Display</span>
              <span className="text-rose-500 font-black">ANTIGRAVITY HANDHELD</span>
              <span>Link Active</span>
            </div>

          </div>

        </div>
      );
    };

    // Mount application
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    // Initialize Lucide Icons after React finishes render
    setTimeout(() => {
      if (window.lucide) window.lucide.createIcons();
    }, 500);
  </script>
</body>
</html>
